services:
  postgres:
    image: postgres:17-alpine
    container_name: leadflow-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-leadflow_ai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
